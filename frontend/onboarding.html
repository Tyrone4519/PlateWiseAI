<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlateWise AI - Onboarding</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-shell">
    <div class="app-screen no-nav-screen">
      <div class="top-bar">
        <h2>Health Profile</h2>
        <span class="top-tag">Setup</span>
      </div>

      <div class="content scroll-area">
        <div class="card hero-card">
          <h3>Tell us about you</h3>
          <p class="muted">This helps PlateWise give safer and more personal nutrition suggestions.</p>
        </div>

        <div class="card">
          <h3>Basic Information</h3>

          <label>Name</label>
          <input type="text" id="name" placeholder="Enter your name" />

          <label>Age</label>
          <input type="number" id="age" placeholder="e.g. 68" />

          <label>Gender</label>
          <select id="gender">
            <option value="">Select gender</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <!-- <option value="non-binary">Non-binary</option>
            <option value="prefer-not-to-say">Prefer not to say</option> -->
          </select>

          <label>Height (cm)</label>
          <input type="number" id="height" placeholder="e.g. 165" />

          <label>Weight (kg)</label>
          <input type="number" id="weight" placeholder="e.g. 65" />
        </div>

        <div class="card">
          <h3>Goal & Health</h3>

          <label>Main Goal</label>
          <select id="goal">
            <option value="">Select goal</option>
            <option value="lose_weight">Lose Weight</option>
            <option value="gain_weight">Gain Weight</option>
            <option value="gain_muscle">Gain Muscle</option>
            <option value="maintain">Maintain</option>
          </select>

          <label>Foods You Cannot Eat</label>
          <input type="text" id="restrictions" placeholder="e.g. peanut, shrimp, vegetarian" />

          <label>Health Conditions</label>
          <textarea id="healthNotes" rows="4" placeholder="e.g. hypertension, diabetes, kidney disease"></textarea>
        </div>

        <button class="primary-btn" id="saveProfileBtn">Save Profile</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/pages/onboardingPage.js"></script>
</body>
</html>

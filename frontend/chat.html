<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PlateWise AI - Chatbot</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css?v=20260515-chat-quick-actions" />
</head>

<body>
  <div class="phone-shell">
    <div class="app-screen chat-stitch-screen">
      <header class="chat-stitch-header">
        <div>
          <span>PlateWise AI</span>
          <h1>Chatbot</h1>
        </div>

        <button type="button" class="chat-stitch-profile-btn" id="chatProfileBtn" aria-label="Open profile">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 12C14.2091 12 16 10.2091 16 8C16 5.79086 14.2091 4 12 4C9.79086 4 8 5.79086 8 8C8 10.2091 9.79086 12 12 12Z"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <path
              d="M5 20C5.9 16.95 8.65 15 12 15C15.35 15 18.1 16.95 19 20"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </header>

      <main class="chat-stitch-layout">
        <section class="chat-stitch-messages" id="chatMessages">
          <div class="chat-stitch-welcome-card">
            <span class="chat-stitch-bot-icon">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 3L20 7V12C20 16.5 16.8 19.8 12 21C7.2 19.8 4 16.5 4 12V7L12 3Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M8.5 12.5L10.8 14.8L15.8 9.8"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <h2>Ready to analyze your plate?</h2>
            <p>Upload a meal image, take a photo, or chat with PlateWise AI about your nutrition goals.</p>
          </div>

        </section>

        <section class="chat-stitch-composer">
          <div class="capability-guide chat-quick-actions" aria-label="Quick chat actions">
            <button
              type="button"
              class="capability-chip"
              data-example="My goal is to lose weight."
              data-tooltip="Update my goal.&#10;Change weight, height, activity level.&#10;Update daily targets."
            >
              Update profile
            </button>

            <button
              type="button"
              class="capability-chip"
              data-example="I cannot eat potatoes."
              data-tooltip="Tell PlateWise foods you avoid.&#10;Add allergies or restrictions.&#10;Manage dietary preferences."
            >
              Food restrictions
            </button>
          </div>

          <div class="chat-stitch-input-shell">
            <input id="chatInput" type="text" placeholder="Ask about your meal..." autocomplete="off" />
            <button type="button" id="sendBtn" aria-label="Send message">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M5 12H19M19 12L13 6M19 12L13 18"
                  stroke="currentColor"
                  stroke-width="2.2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>

          <div class="chat-stitch-action-grid">
            <label class="chat-stitch-action-btn" for="imageUpload">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M5 19H19C20.1 19 21 18.1 21 17V7C21 5.9 20.1 5 19 5H5C3.9 5 3 5.9 3 7V17C3 18.1 3.9 19 5 19Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <path
                  d="M8.5 11C9.32843 11 10 10.3284 10 9.5C10 8.67157 9.32843 8 8.5 8C7.67157 8 7 8.67157 7 9.5C7 10.3284 7.67157 11 8.5 11Z"
                  fill="currentColor"
                />
                <path
                  d="M21 15L16.5 10.5L7 19"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span>Upload</span>
              <input type="file" id="imageUpload" hidden accept="image/*" />
            </label>

            <label class="chat-stitch-action-btn" for="cameraCapture">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M7 7L8.3 5.1C8.67 4.56 9.28 4.25 9.93 4.25H14.07C14.72 4.25 15.33 4.56 15.7 5.1L17 7H18.5C19.6 7 20.5 7.9 20.5 9V17.5C20.5 18.6 19.6 19.5 18.5 19.5H5.5C4.4 19.5 3.5 18.6 3.5 17.5V9C3.5 7.9 4.4 7 5.5 7H7Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 16C13.933 16 15.5 14.433 15.5 12.5C15.5 10.567 13.933 9 12 9C10.067 9 8.5 10.567 8.5 12.5C8.5 14.433 10.067 16 12 16Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
              </svg>
              <span>Camera</span>
              <input type="file" id="cameraCapture" hidden accept="image/*" capture="environment" />
            </label>

            <button type="button" class="chat-stitch-action-btn primary" id="analyzeBtn">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 3L14.35 8.65L20 11L14.35 13.35L12 19L9.65 13.35L4 11L9.65 8.65L12 3Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
              </svg>
              <span>Analyze</span>
            </button>

            <button type="button" class="chat-stitch-action-btn" id="reportBtn">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M7 3.5H14L19 8.5V20.5H7C5.9 20.5 5 19.6 5 18.5V5.5C5 4.4 5.9 3.5 7 3.5Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path d="M14 3.5V8.5H19" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                <path d="M8.5 13H15.5M8.5 16H13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
              <span>Report</span>
            </button>
          </div>
        </section>
      </main>

      <nav class="bottom-nav chat-stitch-nav">
        <a href="dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 13H10V20H4V13ZM14 4H20V20H14V4ZM4 4H10V9H4V4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
          </svg>
          <span>Dashboard</span>
        </a>
        <a href="chat.html" class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 5.5C4 4.67 4.67 4 5.5 4H18.5C19.33 4 20 4.67 20 5.5V14.5C20 15.33 19.33 16 18.5 16H9L5 20V16H5.5C4.67 16 4 15.33 4 14.5V5.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
          </svg>
          <span>Chatbot</span>
        </a>
        <a href="history.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 8V12L15 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12C20 16.42 16.42 20 12 20C9.58 20 7.4 18.92 5.94 17.22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            <path d="M4 17V13H8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>History</span>
        </a>
        <a href="profile.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" stroke="currentColor" stroke-width="1.8" />
            <path d="M5 20C5.9 16.95 8.65 15 12 15C15.35 15 18.1 16.95 19 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
          <span>Profile</span>
        </a>
      </nav>
    </div>
  </div>

  <script type="module" src="./js/pages/chatPage.js?v=20260515-chat-quick-actions"></script>
</body>
</html>

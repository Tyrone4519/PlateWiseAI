<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Email Confirmed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="phone-shell">
    <div class="app-screen gradient-screen auth-screen">
      <div class="card auth-card center-text">
        <div class="logo-circle" id="statusIcon">✓</div>

        <p class="auth-eyebrow">PlateWise AI</p>
        <h3 id="title">Verifying...</h3>
        <p class="muted" id="message">Please wait while we check your email confirmation.</p>

        <button class="primary-btn" id="goLoginBtn" style="display:none;">
          Return to Login
        </button>

        <button class="secondary-btn" id="retryBtn" style="display:none;">
          Try Again
        </button>

        <div class="allergy-row" style="justify-content:center;">
          <span class="allergy-chip">Nutrition Assistant</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./js/lib/supabaseClient.js";

    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const statusIcon = document.getElementById("statusIcon");
    const goLoginBtn = document.getElementById("goLoginBtn");
    const retryBtn = document.getElementById("retryBtn");

    async function handleConfirm() {
      const { data, error } = await supabase.auth.getSession();

      if (error) {
        statusIcon.innerText = "!";
        title.innerText = "Verification failed";
        message.innerText = error.message || "We could not verify your email. Please try again.";
        retryBtn.style.display = "block";
        goLoginBtn.style.display = "block";
        return;
      }

      title.innerText = "Email confirmed";
      message.innerText = "Your account is now active. Please return to the login page and sign in.";
      goLoginBtn.style.display = "block";

      if (data?.session) {
        await supabase.auth.signOut().catch(() => {});
      }
    }

    goLoginBtn.onclick = () => {
      window.location.href = "index.html";
    };

    retryBtn.onclick = () => {
      window.location.reload();
    };

    handleConfirm();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Email Confirmed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top, #fff5df 0%, #f4efe5 45%, #e9efe6 100%);
      color: #243126;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .phone-shell {
      width: 392px;
      max-width: 100%;
      background: linear-gradient(180deg, #304437 0%, #1f2c25 100%);
      border-radius: 34px;
      padding: 12px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    }

    .card {
      background: #fffdf7;
      padding: 34px 24px;
      border-radius: 24px;
      text-align: center;
      width: 100%;
      box-shadow: 0 12px 28px rgba(62, 67, 52, 0.14);
      border: 1px solid #e3ddd0;
    }

    .icon {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3f7d58, #78a985);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 900;
      margin: 0 auto 18px;
    }

    h1 {
      margin: 0 0 10px;
      color: #2f6044;
      font-size: 26px;
    }

    p {
      color: #6f7a6d;
      margin: 0 0 22px;
      line-height: 1.5;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 900;
      margin-top: 10px;
    }

    .primary {
      background: linear-gradient(135deg, #3f7d58, #6fa779);
      color: white;
    }

    .secondary {
      background: #e5f2e8;
      color: #2f6044;
    }

    .small-note {
      margin-top: 16px;
      font-size: 13px;
      color: #6f7a6d;
    }
  </style>
</head>

<body>
  <div class="phone-shell">
    <div class="card">
      <div class="icon" id="statusIcon">✓</div>

      <h1 id="title">Verifying...</h1>
      <p id="message">Please wait while we check your email confirmation.</p>

      <button class="primary" id="goLoginBtn" style="display:none;">
        Return to Login
      </button>

      <button class="secondary" id="retryBtn" style="display:none;">
        Try Again
      </button>

      <div class="small-note">
        PlateWise AI · Nutrition Assistant
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./js/lib/supabaseClient.js";

    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const statusIcon = document.getElementById("statusIcon");
    const goLoginBtn = document.getElementById("goLoginBtn");
    const retryBtn = document.getElementById("retryBtn");

    async function handleConfirm() {
      const { data, error } = await supabase.auth.getSession();

      if (error) {
        statusIcon.innerText = "!";
        title.innerText = "Verification failed";
        message.innerText = error.message || "We could not verify your email. Please try again.";
        retryBtn.style.display = "block";
        goLoginBtn.style.display = "block";
        return;
      }

      title.innerText = "Email confirmed";
      message.innerText = "Your account is now active. Please return to the login page and sign in.";
      goLoginBtn.style.display = "block";

      if (data?.session) {
        await supabase.auth.signOut().catch(() => {});
      }
    }

    goLoginBtn.onclick = () => {
      window.location.href = "index.html";
    };

    retryBtn.onclick = () => {
      window.location.reload();
    };

    handleConfirm();
  </script>
</body>
</html>
